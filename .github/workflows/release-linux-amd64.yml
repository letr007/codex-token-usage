name: release linux amd64

on:
  workflow_dispatch:
    inputs:
      version:
        description: Plugin version without leading v
        required: true
        default: 0.1.22
      tag:
        description: Release tag
        required: true
        default: v0.1.22

permissions:
  contents: write

jobs:
  release-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
          cache: true

      - name: Test
        run: go test ./...

      - name: Build package
        env:
          PLUGIN_VERSION: ${{ inputs.version }}
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '1'
        run: ./package-release.sh dist

      - name: Verify package
        run: |
          test -f "dist/codex-token-usage_${{ inputs.version }}_linux_amd64.zip"
          test -f dist/checksums.txt
          unzip -l "dist/codex-token-usage_${{ inputs.version }}_linux_amd64.zip"
          cat dist/checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          notes="Fork build with dashboard style aligned to Cli-Proxy-API-Management-Center.\n\nTarget: linux/amd64"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip dist/checksums.txt --clobber
          else
            gh release create "$TAG" dist/*.zip dist/checksums.txt \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "$notes"
          fi
